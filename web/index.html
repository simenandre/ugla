<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baby Monitor</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: #0b0d10; color: #e7e9ec;
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 { font-size: 1rem; font-weight: 600; margin: 0; opacity: .7; letter-spacing: .02em; }
    .wrap { width: min(96vw, 1000px); }
    video {
      width: 100%; aspect-ratio: 16 / 9; background: #000;
      border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    .bar { display: flex; align-items: center; gap: .75rem; margin-top: .75rem; }
    button {
      background: #1f2937; color: #e7e9ec; border: 1px solid #374151;
      border-radius: 8px; padding: .5rem .9rem; font-size: .9rem; cursor: pointer;
    }
    button:hover { background: #374151; }
    #status { font-size: .85rem; opacity: .65; }
    #status.live::before { content: "● "; color: #ef4444; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>👶 Baby Monitor</h1>
    <div style="position:relative">
      <video id="video" controls autoplay muted playsinline autopictureinpicture></video>
      <button id="playoverlay" style="display:none;position:absolute;inset:0;margin:auto;width:120px;height:48px">▶ Play</button>
    </div>
    <div class="bar">
      <button id="unmute">🔊 Unmute</button>
      <button id="pip">⧉ Pop out (PiP)</button>
      <button id="reload">↻ Reconnect</button>
      <span id="status">starting…</span>
    </div>
    <p style="font-size:.8rem;opacity:.5;margin:.25rem 0 0">
      Tip: click <b>Pop out</b>, then switch away from this tab — the feed floats on top.
      Keep this tab open in the background (closing it ends the stream).
    </p>
    <pre id="dbg" style="font-size:.72rem;line-height:1.35;background:#11151a;border:1px solid #222;border-radius:8px;padding:.6rem;margin-top:.6rem;max-height:160px;overflow:auto;white-space:pre-wrap"></pre>
  </div>

  <script src="/hls.min.js"></script>
  <script>
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const dbgEl = document.getElementById("dbg");

    // --- diagnostics: log key events so we can see what happens on window switch
    const t0 = Date.now();
    function dbg(msg) {
      const line = ((Date.now() - t0) / 1000).toFixed(1) + "s  " + msg;
      console.log("[bm]", line);
      dbgEl.textContent += line + "\n";
      dbgEl.scrollTop = dbgEl.scrollHeight;
    }
    dbg("page loaded. pipEnabled=" + document.pictureInPictureEnabled +
        " mediaSession=" + ("mediaSession" in navigator) +
        " secureContext=" + window.isSecureContext);
    ["play","pause","playing","waiting","stalled","suspend","emptied","ended","error",
     "enterpictureinpicture","leavepictureinpicture"].forEach((ev) =>
      video.addEventListener(ev, () => dbg("video:" + ev +
        (ev === "error" && video.error ? " (" + video.error.code + ")" : ""))));
    document.addEventListener("visibilitychange", () => dbg("doc visibility=" + document.visibilityState));
    window.addEventListener("blur", () => dbg("window blur (switched away)"));
    window.addEventListener("focus", () => dbg("window focus (switched back)"));
    window.addEventListener("pagehide", () => dbg("pagehide"));
    const playOverlay = document.getElementById("playoverlay");
    const src = "/hls/stream.m3u8";
    let hls;

    function setLive() { statusEl.textContent = "live"; statusEl.classList.add("live"); }
    function setMsg(m) { statusEl.textContent = m; statusEl.classList.remove("live"); }

    function tryPlay() {
      video.play().then(() => { playOverlay.style.display = "none"; })
        .catch((e) => {
          // Autoplay blocked — show a manual play button.
          console.warn("autoplay blocked:", e);
          playOverlay.style.display = "block";
          setMsg("ready — click ▶ Play");
        });
    }
    playOverlay.onclick = tryPlay;
    video.addEventListener("playing", () => { setLive(); playOverlay.style.display = "none"; });

    // A full restart destroys the MediaSource, which closes any PiP window and
    // interrupts background playback. Only do it when the page is visible and
    // not in PiP; otherwise recover in place.
    function safeRestart() {
      if (document.hidden || document.pictureInPictureElement) {
        if (hls) hls.startLoad();
        return;
      }
      setTimeout(start, 2000);
    }

    // Coming back to the tab: nudge the loader and playback back to live.
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && hls) { hls.startLoad(); video.play().catch(() => {}); }
    });

    function start() {
      if (hls) { hls.destroy(); hls = null; }
      setMsg("connecting…");
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          liveSyncDurationCount: 4, enableWorker: true,
          backBufferLength: 30, maxBufferLength: 30,
        });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);
        hls.on(Hls.Events.FRAG_BUFFERED, setLive);
        hls.on(Hls.Events.ERROR, (_, data) => {
          console.error("hls.js error:", data.type, data.details, data.fatal, data);
          if (!data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { setMsg("network error — retrying…"); hls.startLoad(); }
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { setMsg("media error — recovering…"); hls.recoverMediaError(); }
          else { setMsg("error: " + data.details); safeRestart(); }
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        // Safari / native HLS fallback
        video.src = src;
        tryPlay();
      } else {
        setMsg("HLS not supported in this browser");
      }
    }

    document.getElementById("unmute").onclick = () => {
      video.muted = !video.muted;
      document.getElementById("unmute").textContent = video.muted ? "🔊 Unmute" : "🔇 Mute";
    };
    document.getElementById("reload").onclick = start;

    // Picture-in-Picture: a manual button + auto-PiP when the tab is hidden.
    const pipBtn = document.getElementById("pip");
    if (document.pictureInPictureEnabled) {
      video.autoPictureInPicture = true; // Arc/Chromium: auto-float on tab switch
      pipBtn.onclick = async () => {
        try {
          if (document.pictureInPictureElement) await document.exitPictureInPicture();
          else { if (video.paused) await video.play().catch(() => {}); await video.requestPictureInPicture(); }
        } catch (e) { console.error("PiP failed:", e); setMsg("PiP failed: " + e.message); }
      };
      video.addEventListener("enterpictureinpicture", () => { pipBtn.textContent = "⧉ Exit PiP"; });
      video.addEventListener("leavepictureinpicture", () => { pipBtn.textContent = "⧉ Pop out (PiP)"; });
    } else {
      pipBtn.style.display = "none";
    }

    // Auto-PiP like YouTube: registering a Media Session "enterpictureinpicture"
    // action is what tells Chromium/Arc to auto-float the video when you switch
    // window/app while it's playing. The autoPictureInPicture attribute alone
    // isn't enough on a regular page.
    if ("mediaSession" in navigator) {
      try {
        navigator.mediaSession.metadata = new MediaMetadata({ title: "Baby Monitor" });
        navigator.mediaSession.setActionHandler("enterpictureinpicture", async () => {
          dbg("media-session enterpictureinpicture action FIRED");
          try { await video.requestPictureInPicture(); dbg("requestPictureInPicture ok"); }
          catch (e) { dbg("requestPictureInPicture FAILED: " + e.name + " " + e.message); }
        });
        dbg("registered media-session enterpictureinpicture handler");
      } catch (e) { console.warn("media session auto-PiP unsupported:", e); }
      video.addEventListener("play", () => { navigator.mediaSession.playbackState = "playing"; });
      video.addEventListener("pause", () => { navigator.mediaSession.playbackState = "paused"; });
    }

    start();
  </script>
</body>
</html>
