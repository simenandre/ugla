name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Build, sign & notarize
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - uses: actions/setup-go@v5
        with: { go-version: "stable" }

      - name: Build universal app
        run: swift build --package-path app -c release --arch arm64 --arch x86_64 --product Ugla

      - name: Build universal bridge
        run: |
          cd bridge
          CGO_ENABLED=0 GOARCH=arm64 go build -o /tmp/bridge.arm64 .
          CGO_ENABLED=0 GOARCH=amd64 go build -o /tmp/bridge.amd64 .
          lipo -create -output /tmp/avent-webrtc-bridge /tmp/bridge.arm64 /tmp/bridge.amd64

      # Self-contained static ffmpeg, hosted on this repo's pinned `vendor-ffmpeg`
      # release and verified by checksum, then combined into a universal binary.
      - name: Fetch & verify ffmpeg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download vendor-ffmpeg --repo "$GITHUB_REPOSITORY" \
            -p ffmpeg-arm64 -p ffmpeg-amd64 -D /tmp/ff
          echo "9a08d61f9328e8164ba560ee7a79958e357307fcfeea6fe626b7d66cdc287028  /tmp/ff/ffmpeg-arm64" | shasum -a 256 -c -
          echo "60725ea0467ccaf900bf294d3567c302a802dc661f03bdde6aa7ecc9ccf05c4f  /tmp/ff/ffmpeg-amd64" | shasum -a 256 -c -
          chmod +x /tmp/ff/ffmpeg-arm64 /tmp/ff/ffmpeg-amd64
          lipo -create -output /tmp/ffmpeg /tmp/ff/ffmpeg-arm64 /tmp/ff/ffmpeg-amd64

      - name: Assemble app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="Ugla.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/Helpers"
          cp "$(swift build --package-path app -c release --arch arm64 --arch x86_64 --show-bin-path)/Ugla" "$APP/Contents/MacOS/"
          sed "s#0.1.0#$VERSION#" app/Resources/Info.plist > "$APP/Contents/Info.plist"
          printf 'APPL????' > "$APP/Contents/PkgInfo"
          cp /tmp/avent-webrtc-bridge /tmp/ffmpeg "$APP/Contents/Resources/Helpers/"
          chmod +x "$APP/Contents/Resources/Helpers/"*
          echo "APP=$APP" >> "$GITHUB_ENV"; echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/signing.keychain-db"; PW="$(openssl rand -base64 32)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$PW" "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          # The exported p12 holds only the leaf + private key; import Apple's
          # Developer ID intermediates so the cert chains to a trusted root and
          # validates as a codesigning identity.
          for ca in DeveloperIDG2CA DeveloperIDCA; do
            curl -fsSL "https://www.apple.com/certificateauthority/$ca.cer" -o "$RUNNER_TEMP/$ca.cer" \
              && security import "$RUNNER_TEMP/$ca.cer" -t cert -f x509 -k "$KC" || true
          done
          security set-key-partition-list -S apple-tool:,apple: -k "$PW" "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db
          ID=$(security find-identity -v -p codesigning "$KC" | grep -oE '"[^"]+"' | tr -d '"' | head -1)
          if [ -z "$ID" ]; then
            echo "::error::No valid Developer ID identity in keychain"
            security find-identity -p codesigning "$KC" || true
            exit 1
          fi
          echo "Signing identity: $ID"
          echo "SIGNING_IDENTITY=$ID" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Codesign (Hardened Runtime; helpers then app)
        run: |
          for f in "$APP/Contents/Resources/Helpers/avent-webrtc-bridge" "$APP/Contents/Resources/Helpers/ffmpeg" "$APP"; do
            codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$f"
          done
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG
        run: |
          mkdir dmg && cp -R "$APP" dmg/ && ln -s /Applications dmg/Applications
          hdiutil create -volname "Ugla" -srcfolder dmg -ov -format UDZO "Ugla-$VERSION.dmg"

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "Ugla-$VERSION.dmg" --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "Ugla-$VERSION.dmg"

      - uses: softprops/action-gh-release@v2
        with:
          name: "Ugla ${{ env.VERSION }}"
          files: Ugla-${{ env.VERSION }}.dmg
          prerelease: ${{ contains(github.ref_name, '-') }}
